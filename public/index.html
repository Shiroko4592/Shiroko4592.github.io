<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liveswiki — 리브위키</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230ea5e9'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' font-family='Arial' font-size='34' font-weight='700' fill='%23001018'%3EL%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1 class="brand">Liveswiki <span class="brand-sub">리브위키</span></h1>
      <button id="newPageBtn" class="primary">+ New page</button>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <h2>Pages</h2>
        <ul id="pageList"></ul>
      </aside>

      <section class="content">
        <div id="empty" class="empty">
          <p>Select a page on the left, or create a new one to get started.</p>
        </div>

        <article id="viewer" class="hidden">
          <header class="page-header">
            <h2 id="viewTitle"></h2>
            <div class="page-actions">
              <button id="editBtn">Edit</button>
              <button id="deleteBtn" class="danger">Delete</button>
            </div>
          </header>
          <div id="viewContent" class="markdown"></div>
          <p id="viewMeta" class="meta"></p>
        </article>

        <form id="editor" class="hidden">
          <input id="editTitle" type="text" placeholder="Page title" required />
          <textarea
            id="editContent"
            rows="18"
            placeholder="Write your page in Markdown..."
          ></textarea>
          <div class="editor-actions">
            <button type="submit" class="primary">Save</button>
            <button type="button" id="cancelBtn">Cancel</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
